<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>National Primary School Games 2026 — Card Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+Khmer:wght@400;700;900&family=Koulen&family=Khmer+OS+Muol&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: Arial, sans-serif;
        background: transparent;
        min-height: 100vh;
      }

      .layout {
        display: flex;
        gap: 0;
        padding: 0;
        width: 100%;
        margin: 0;
        align-items: flex-start;
      }

      .preview-area {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        width: 100%;
        padding: 0;
      }

      /* ══════════════════════════════
   CARD — A6 ratio 105:148 ≈ 1:1.41
   Display: 310 x 437px
   ══════════════════════════════ */
      .card-wrapper {
        position: relative;
        width: 310px;
        height: 437px;
        overflow: hidden;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.25);
        background: #fff;
      }
      .card-bg {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
        pointer-events: none;
      }

      /* ── HEADER TEXT
   Logo in SVG: roughly left 0–30%, top 0–21%
   Text block sits to the right of logo */
      .card-header {
        position: absolute;
        top: 3%;
        left: 29%;
        right: 2%;
        display: flex;
        flex-direction: column;
        gap: 1px;
      }
      .hdr-kh {
        font-family: "Khmer OS Muol", "Noto Sans Khmer", Arial, sans-serif;
        font-size: 9px;
        font-weight: 100;
        color: #2e3192;
        margin-left: 12px;
        line-height: 1.3;
        /* font-stretch: expanded; */
        letter-spacing: 0.6px;
      }

      .hdr-date {
        font-family: "Noto Sans Khmer", Arial, sans-serif;
        font-size: 8px;
        color: #555;
        margin-left: 31px;
        margin-top: -7px;
        line-height: 1.3;
      }

      /* ── PHOTO BOX
   Based on SVG rect: x=20.31 y=112.69 w=70.16 h=90.2
   on card 297.67x420.94
   → left=6.8% top=26.8% w=23.6% h=21.4% */
      .card-photo {
        position: absolute;
        left: 6.8%;
        top: 26.6%;
        width: 24%;
        height: 22%;
        border: 1.5px solid #2e3192;
        /* background: #dde4ee; */
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .card-photo img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: none;
      }
      .card-photo-ph {
        font-size: 8px;
        color: #aaa;
        text-align: center;
        font-family: "Noto Sans Khmer", Arial, sans-serif;
        line-height: 1.5;
      }

      /* ── NAME BLOCK
   Right side, vertically aligned with photo top
   "លោក" prefix + Khmer name + Latin name
   Sits above the category letter on the right */
      .card-name-block {
        position: absolute;
        left: 60%;
        top: 24%;
        right: 0%;
        transform: translateX(-50%);
        text-align: center;
        padding-left: 20px;
        padding-right: 20px;
        width: 80%;
      }
      .name-kh {
        font-family: "Koulen", "Noto Sans Khmer", Arial, sans-serif;
        font-size: 18px;
        font-weight: 100;
        color: #2e3192;
        line-height: 1.3;
        display: block;
        margin-top: 8px;
      }

      /* ── CATEGORY LETTER
   Large letter, RIGHT-CENTER of card, below the name block
   Visually: roughly right 55–90%, top 42–58% */
      .card-cat {
        position: absolute;
        left: 58%; /* right-center */
        top: 35%;
        font-family: "Arial Black", Arial, sans-serif;
        font-size: 75px;
        font-weight: 900;
        line-height: 1;
        color: #ed2224; /* default red; JS overrides per role */
      }

      /* ── SUBTITLE — left side, below photo */
      .card-subtitle {
        position: absolute;
        left: 6%;
        top: 57%;
        width: 54%;
        font-size: 7.5px;
        color: #2e3192;
        line-height: 1.75;
        font-family: "Khmer OS Muol", "Noto Sans Khmer", Arial, sans-serif;
        font-weight: 700;
      }

      /* ── QR CODE — bottom left, above banner */
      .card-qr {
        position: absolute;
        left: 5.5%;
        bottom: 12.5%;
        background: #fff;
        padding: 3px;
        border: 1px solid #bbb;
        line-height: 0;
      }
      .card-qr canvas,
      .card-qr img {
        width: 72px !important;
        height: 72px !important;
      }

      /* ── SPORT BANNER — bottom blue strip from SVG
   y=381.99/420.94 = 90.75% from top → height ≈9.25% */
      .card-sport {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 9.3%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .card-sport span {
        color: #fff;
        font-size: 15px;
        font-weight: 700;
        font-family: "Noto Sans Khmer", Arial, sans-serif;
      }

      .hint {
        font-size: 11px;
        color: #999;
        text-align: center;
      }

      @media print {
        body {
          background: #fff;
        }
        .preview-area > h2,
        .hint {
          display: none;
        }
        .layout {
          padding: 0;
          justify-content: center;
        }
        .card-wrapper {
          box-shadow: none;
          width: 297px;
          height: 420px;
        }
      }
    </style>
  </head>

          <!-- SUBTITLE (left, below photo) -->
          <div class="card-subtitle"></div>

          <!-- QR CODE -->
          <div class="card-qr" id="card-qr"></div>

          <!-- SPORT BANNER -->
          <div class="card-sport">
            <span id="card-sport"></span>
          </div>
        </div>
      </div>
    </div>

    <script>
      function generateQR(uuid) {
        const box = document.getElementById("card-qr");
        box.innerHTML = "";
        try {
          new QRCode(box, {
            text: "https://yourapp.com/card/" + uuid,
            width: 72,
            height: 72,
            colorDark: "#000",
            colorLight: "#fff",
            correctLevel: QRCode.CorrectLevel.M,
          });
        } catch (e) {}
      }

      window.addEventListener('message', function(e) {
        if (!e.data || e.data.type !== 'CARD_UPDATE') return;
        const d = e.data;
        document.getElementById('card-date').textContent = d.eventDateLine || '';
        document.getElementById('card-kh').textContent = (d.prefix || '') + ' ' + (d.participantName || '');
        document.getElementById('card-sport').textContent = d.sportName || '';
        const catEl = document.getElementById('card-cat');
        catEl.textContent = d.categoryLetter || 'F';
        const colors = { A:'#2e3192', B:'#2e3192', D:'#2e3192', Fo:'#ed2224', F:'#ed2224', V:'#f58220' };
        catEl.style.color = colors[d.categoryLetter] || '#2e3192';
        const img = document.getElementById('photo-img');
        const ph = document.getElementById('photo-ph');
        if (d.photoUrl) {
          img.src = d.photoUrl;
          img.style.display = 'block';
          ph.style.display = 'none';
          img.onerror = () => { img.style.display = 'none'; ph.style.display = 'block'; };
        } else {
          img.style.display = 'none';
          ph.style.display = 'block';
        }
        if (d.cardUuid) {
          clearTimeout(window._qrTimer);
          window._qrTimer = setTimeout(() => generateQR(d.cardUuid), 300);
        }
        if (d.subtitleKh) {
          const sub = document.querySelector('.card-subtitle');
          if (sub) sub.innerHTML = d.subtitleKh;
        }
      });
      window.parent.postMessage({ type: 'CARD_READY' }, '*');
    </script>
  </body>
</html>
